name: Early-access request / quote request
description: Report a Codex bug for review, early-access interest, a funding inquiry, or a quote request.
title: "[early-access]: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Issues without credible buyer interest may be closed without reply. The maintainer reviews issues before implementation. If an early-access build containing the fix is completed, the maintainer may publish a Polar checkout link or invoice for immediate delivery, or you may request a quote for private/professional work.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug or request.
      placeholder: Short summary
    validations:
      required: true
  - type: input
    id: upstream_version
    attributes:
      label: Upstream Codex version
      description: Upstream release version or commit where the problem occurs.
      placeholder: 1.3.6
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform/OS
      description: Platform, OS version, architecture, and shell if relevant.
      placeholder: macOS 15 arm64
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact steps needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: Describe the actual behavior.
    validations:
      required: true
  - type: input
    id: upstream_issue
    attributes:
      label: Link to upstream issue, if any
      description: Link to an upstream `openai/codex` issue if one exists.
      placeholder: https://github.com/openai/codex/issues/1234
    validations:
      required: false
  - type: textarea
    id: business_impact
    attributes:
      label: Business impact
      description: Explain why this matters and any deadlines or operational impact.
      placeholder: Describe impact, urgency, and affected users.
    validations:
      required: true
  - type: dropdown
    id: interest_status
    attributes:
      label: Early-access interest status
      options:
        - Awaiting maintainer review
        - Interested in purchasing early access at the specified price
        - Requesting a quote first
        - Professional-services inquiry
        - Maintainer-approved for implementation
    validations:
      required: true
  - type: input
    id: estimated_price
    attributes:
      label: Estimated early-access price
      description: Suggested price for early access to the completed private build, if one is produced.
      placeholder: USD 3000
    validations:
      required: false
  - type: input
    id: polar_link
    attributes:
      label: Polar link or note
      description: Leave blank until a completed private early-access build exists. After that, provide the Polar checkout URL, invoice link, or delivery note.
      placeholder: TODO_POLAR_URL
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Buyer-interest comment for approved issues:

        `I am interested in purchasing early access at the specified price`
  - type: dropdown
    id: quote_request
    attributes:
      label: Whether this is a quote request
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  - type: textarea
    id: contact_information
    attributes:
      label: Contact information
      description: Share the preferred way to contact you about scope, early access, or a quote.
      placeholder: GitHub handle, email, company name, or other contact details.
    validations:
      required: true
  - type: checkboxes
    id: agreement
    attributes:
      label: Agreement
      options:
        - label: I understand that issues without credible buyer interest may be closed without reply.
          required: true
        - label: I understand that no payment is collected unless and until the private early-access build is complete and available for immediate delivery.
          required: true
        - label: I understand that buyers may comment "I am interested in purchasing early access at the specified price" only as a non-binding signal of interest.
          required: true
        - label: I understand that a completed early-access build containing this fix may be sold up to 30 days before the same fix is added to the public release.
          required: true
        - label: I understand that early-access builds may also contain other unreleased fixes.
          required: true
        - label: I understand that fixes are public and early-access purchases do not grant exclusive ownership of the fix.
          required: true
        - label: I understand that liability is limited to the amount paid for the specific early-access build or related engagement.
          required: true
        - label: I understand there is no warranty unless separately agreed in writing.
          required: true
