name: Bazel

on:
  workflow_call:
    inputs:
      upstream_ref:
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

concurrency:
  group: bazel-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  test:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    name: Bazel test on ${{ matrix.os }} for ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-version: 1.28.1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux sandbox build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Check rusty_v8 MODULE.bazel checksums
        if: ${{ matrix.os == 'ubuntu-24.04' && matrix.target == 'x86_64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          python3 .github/scripts/rusty_v8_bazel.py check-module-bazel
          just test-github-scripts

      - name: Check MODULE.bazel.lock is up to date
        if: ${{ matrix.os == 'ubuntu-24.04' && matrix.target == 'x86_64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          ./scripts/check-module-bazel-lock.sh

      - name: bazel test //...
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          bazel_targets=(
            //...
            -//third_party/v8:all
            -//codex-rs/v8-poc:v8-poc-unit-tests
          )
          ./.github/scripts/run-bazel-ci.sh \
            --print-failed-action-summary \
            --print-failed-test-logs \
            -- \
            test \
            --test_tag_filters=-argument-comment-lint \
            --test_verbose_timeout_warnings \
            --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
            -- \
            "${bazel_targets[@]}"

      - name: Upload Bazel execution logs
        if: always() && !cancelled()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bazel-execution-logs-test-${{ matrix.target }}
          path: ${{ runner.temp }}/bazel-execution-logs
          if-no-files-found: ignore

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  test-windows-shard:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard:
          - 1
          - 2
          - 3
          - 4
    runs-on: windows-latest
    name: Bazel test on windows-latest for x86_64-pc-windows-gnullvm shard ${{ matrix.shard }}/4
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-version: 1.28.1

      - name: Test BuildBuddy Bazel wrapper
        if: matrix.shard == 1
        shell: pwsh
        run: python upstream/.github/scripts/test_run_bazel_with_buildbuddy.py

      - name: bazel test shard
        env:
          BAZEL_TEST_SHARD: ${{ matrix.shard }}
          BAZEL_TEST_SHARD_COUNT: 4
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          bazel_test_query='tests(//...) except tests(//third_party/v8:all) except attr(tags, "manual", tests(//...))'
          mapfile -t bazel_targets < <(
            ./.github/scripts/run-bazel-query-ci.sh --output=label -- "${bazel_test_query}" | LC_ALL=C sort
          )
          selected_targets=()
          for bazel_target in "${bazel_targets[@]}"; do
            target_bucket="$(
              printf '%s\n' "${bazel_target}" | cksum | awk -v shard_count="${BAZEL_TEST_SHARD_COUNT}" '{ print ($1 % shard_count) + 1 }'
            )"
            if [[ "${target_bucket}" == "${BAZEL_TEST_SHARD}" ]]; then
              selected_targets+=("${bazel_target}")
            fi
          done
          ./.github/scripts/run-bazel-ci.sh \
            --print-failed-action-summary \
            --print-failed-test-logs \
            --windows-cross-compile \
            --remote-download-toplevel \
            -- \
            test \
            --skip_incompatible_explicit_targets \
            --test_tag_filters=-argument-comment-lint \
            --test_verbose_timeout_warnings \
            --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
            --build_metadata=TAG_windows_test_shard=${BAZEL_TEST_SHARD} \
            -- \
            "${selected_targets[@]}"

      - name: Upload Bazel execution logs
        if: always() && !cancelled()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bazel-execution-logs-test-x86_64-pc-windows-gnullvm-shard-${{ matrix.shard }}
          path: ${{ runner.temp }}/bazel-execution-logs
          if-no-files-found: ignore

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  test-windows:
    if: always()
    needs: test-windows-shard
    runs-on: ubuntu-latest
    name: Bazel test on windows-latest for x86_64-pc-windows-gnullvm
    steps:
      - name: Confirm Windows Bazel test shards passed
        shell: bash
        run: |
          if [[ "${{ needs.test-windows-shard.result }}" != "success" ]]; then
            echo "Windows Bazel test shards finished with result: ${{ needs.test-windows-shard.result }}" >&2
            exit 1
          fi

  test-windows-native-main:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    timeout-minutes: 60
    runs-on: windows-latest
    name: Bazel test on windows-latest for x86_64-pc-windows-gnullvm (native main)
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-version: 1.28.1

      - name: bazel test //...
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          bazel_targets=(
            //...
            -//third_party/v8:all
            -//codex-rs/v8-poc:v8-poc-unit-tests
          )
          bazel_test_args=(
            test
            --test_tag_filters=-argument-comment-lint
            --test_verbose_timeout_warnings
            --build_metadata=COMMIT_SHA=${GITHUB_SHA}
            --build_metadata=TAG_windows_native_main=true
          )
          ./.github/scripts/run-bazel-ci.sh \
            --print-failed-action-summary \
            --print-failed-test-logs \
            -- \
            "${bazel_test_args[@]}" \
            -- \
            "${bazel_targets[@]}"

      - name: Upload Bazel execution logs
        if: always() && !cancelled()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bazel-execution-logs-test-windows-native-x86_64-pc-windows-gnullvm
          path: ${{ runner.temp }}/bazel-execution-logs
          if-no-files-found: ignore

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  clippy:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnullvm
    runs-on: ${{ matrix.os }}
    name: Bazel clippy on ${{ matrix.os }} for ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-version: 1.28.1

      - name: bazel build --config=clippy lint targets
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          bazel_clippy_args=(
            --config=clippy
            --build_metadata=COMMIT_SHA=${GITHUB_SHA}
            --build_metadata=TAG_job=clippy
          )
          bazel_wrapper_args=()
          bazel_target_list_args=()
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            bazel_wrapper_args+=(--windows-cross-compile)
            bazel_target_list_args+=(--windows-cross-compile)
            bazel_clippy_args+=(--skip_incompatible_explicit_targets)
          fi
          bazel_target_lines="$(./scripts/list-bazel-clippy-targets.sh "${bazel_target_list_args[@]}")"
          bazel_targets=()
          while IFS= read -r target; do
            bazel_targets+=("${target}")
          done <<< "${bazel_target_lines}"
          ./.github/scripts/run-bazel-ci.sh \
            --print-failed-action-summary \
            "${bazel_wrapper_args[@]}" \
            -- \
            build \
            "${bazel_clippy_args[@]}" \
            -- \
            "${bazel_targets[@]}"

      - name: Upload Bazel execution logs
        if: always() && !cancelled()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bazel-execution-logs-clippy-${{ matrix.target }}
          path: ${{ runner.temp }}/bazel-execution-logs
          if-no-files-found: ignore

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  verify-release-build:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnullvm
    runs-on: ${{ matrix.os }}
    name: Verify release build on ${{ matrix.os }} for ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-version: 1.28.1

      - name: Verify release build
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          bazel_build_args=(
            --compilation_mode=fastbuild
            --@rules_rust//rust/settings:extra_rustc_flag=-Cdebug-assertions=no
            --@rules_rust//rust/settings:extra_exec_rustc_flag=-Cdebug-assertions=no
            --build_metadata=COMMIT_SHA=${GITHUB_SHA}
            --build_metadata=TAG_job=verify-release-build
            --build_metadata=TAG_rust_debug_assertions=off
          )
          bazel_wrapper_args=()
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            bazel_wrapper_args+=(--windows-cross-compile --remote-download-toplevel)
          fi
          bazel_target_lines="$(bash ./scripts/list-bazel-release-targets.sh)"
          bazel_targets=()
          while IFS= read -r target; do
            bazel_targets+=("${target}")
          done <<< "${bazel_target_lines}"
          ./.github/scripts/run-bazel-ci.sh \
            --print-failed-action-summary \
            "${bazel_wrapper_args[@]}" \
            -- \
            build \
            "${bazel_build_args[@]}" \
            -- \
            "${bazel_targets[@]}"

      - name: Upload Bazel execution logs
        if: always() && !cancelled()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bazel-execution-logs-verify-release-${{ matrix.target }}
          path: ${{ runner.temp }}/bazel-execution-logs
          if-no-files-found: ignore

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
