name: rust-ci-full

on:
  workflow_call:
    inputs:
      upstream_ref:
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

jobs:
  cargo-deny:
    uses: ./.github/workflows/cargo-deny.yml
    with:
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  codespell:
    uses: ./.github/workflows/codespell.yml
    secrets: inherit

  repo-checks:
    uses: ./.github/workflows/repo-checks.yml
    with:
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  rust-ci:
    uses: ./.github/workflows/rust-ci.yml
    with:
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  sdk:
    uses: ./.github/workflows/sdk.yml
    with:
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  bazel:
    uses: ./.github/workflows/bazel.yml
    with:
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  v8-canary:
    uses: ./.github/workflows/v8-canary.yml
    with:
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  tests-linux-x64:
    uses: ./.github/workflows/rust-ci-full-nextest-platform.yml
    with:
      runner: ubuntu-latest
      target: x86_64-unknown-linux-gnu
      profile: ci-test
      artifact_id: linux-x64
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  tests-macos-arm64:
    uses: ./.github/workflows/rust-ci-full-nextest-platform.yml
    with:
      runner: macos-15
      target: aarch64-apple-darwin
      profile: ci-test
      artifact_id: macos-arm64
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  tests-windows-x64:
    uses: ./.github/workflows/rust-ci-full-nextest-platform.yml
    with:
      runner: windows-latest
      target: x86_64-pc-windows-msvc
      profile: ci-test
      artifact_id: windows-x64
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  tests-linux-arm64:
    uses: ./.github/workflows/rust-ci-full-nextest-platform.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-gnu
      profile: ci-test
      artifact_id: linux-arm64
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  tests-macos-x64:
    uses: ./.github/workflows/rust-ci-full-nextest-platform.yml
    with:
      runner: macos-15
      target: x86_64-apple-darwin
      profile: ci-test
      artifact_id: macos-x64
      upstream_ref: ${{ inputs.upstream_ref || 'main' }}
    secrets: inherit

  results:
    name: rust-ci-full results
    if: ${{ always() }}
    needs:
      - cargo-deny
      - codespell
      - repo-checks
      - rust-ci
      - sdk
      - bazel
      - v8-canary
      - tests-linux-x64
      - tests-macos-arm64
      - tests-macos-x64
      - tests-windows-x64
      - tests-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Require successful dependencies
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: python3 .github/scripts/check_ci_results.py
