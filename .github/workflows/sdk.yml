name: sdk

on:
  workflow_call:
    inputs:
      upstream_ref:
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

jobs:
  python-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - name: Test Python SDK
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/codex-python-sdk-home \
            -e UV_LINK_MODE=copy \
            -v "${GITHUB_WORKSPACE}/upstream:${GITHUB_WORKSPACE}/upstream" \
            -w "${GITHUB_WORKSPACE}/upstream/sdk/python" \
            python:3.12-slim \
            sh -euxc '
              python -m venv /tmp/uv
              /tmp/uv/bin/python -m pip install uv==0.11.3
              /tmp/uv/bin/uv sync --group dev --frozen
              /tmp/uv/bin/uv run --frozen --no-sync ruff check --output-format=github .
              /tmp/uv/bin/uv run --frozen --no-sync ruff format --check .
              /tmp/uv/bin/uv run --frozen --no-sync pytest
            '

  sdks:
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        shell: bash
        run: |
          set -euo pipefail
          echo "TODO: upstream TypeScript/Bazel SDK workflow depends on fuller Bazel parity and upstream-specific cache/layout assumptions."
