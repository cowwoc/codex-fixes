name: python-runtime-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Patched GitHub release tag to publish runtime wheels from."
        required: true
        type: string
      publish_to_pypi:
        description: "Publish to PyPI after downloading wheels."
        required: false
        default: false
        type: boolean

concurrency:
  group: python-runtime-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  prepare-python-runtime:
    name: prepare-python-runtime
    permissions:
      contents: read
    uses: ./.github/workflows/python-runtime-build.yml
    with:
      release_tag: ${{ inputs.release_tag }}

  publish-python-runtime:
    if: ${{ inputs.publish_to_pypi }}
    name: publish-python-runtime
    needs: prepare-python-runtime
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python runtime wheels
        uses: actions/download-artifact@v4
        with:
          name: python-runtime-wheels
          path: dist/python-runtime

      - name: Publish Python runtime wheels to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist/python-runtime
          skip-existing: true
