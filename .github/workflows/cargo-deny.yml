name: cargo-deny

on:
  workflow_call:
    inputs:
      upstream_ref:
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246
        with:
          rust-version: stable
          manifest-path: ./upstream/codex-rs/Cargo.toml
