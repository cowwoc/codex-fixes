name: Upstream release check

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Optional upstream tag override."
        required: false
        type: string
      patch_release_number:
        description: "Optional patched release suffix override. Defaults to 0."
        required: false
        type: string

concurrency:
  group: upstream-release-check
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      upstream_tag: ${{ steps.prepare.outputs.upstream_tag }}
      upstream_sha: ${{ steps.prepare.outputs.upstream_sha }}
      patched_tag: ${{ steps.prepare.outputs.patched_tag }}
      build_date: ${{ steps.prepare.outputs.build_date }}
      patch_files: ${{ steps.prepare.outputs.patch_files }}
      supported_targets: ${{ steps.prepare.outputs.supported_targets }}
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Determine upstream release
        id: prepare
        shell: bash
        env:
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag || '' }}
          INPUT_PATCH_RELEASE_NUMBER: ${{ inputs.patch_release_number || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          patch_release="${INPUT_PATCH_RELEASE_NUMBER:-0}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ -n "${INPUT_UPSTREAM_TAG:-}" ]]; then
            upstream_tag="${INPUT_UPSTREAM_TAG}"
          else
            upstream_tag="$(./scripts/check-upstream-release.sh openai/codex | jq -r '.tag_name')"
          fi

          if [[ -z "${upstream_tag}" || "${upstream_tag}" == "null" ]]; then
            echo "ERROR: failed to determine upstream tag" >&2
            exit 1
          fi

          patched_tag="${upstream_tag}.${patch_release}"

          if gh release view "${patched_tag}" >/dev/null 2>&1; then
            echo "Patched release ${patched_tag} already exists."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
            echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
            echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
            echo "patch_files=$(find patches -type f -name '*.patch' -printf '%P ' | sed 's/[[:space:]]*$//')" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git clone --depth 1 --branch "${upstream_tag}" https://github.com/openai/codex.git upstream
          upstream_sha="$(git -C upstream rev-parse HEAD)"
          patch_files="$(find patches -type f -name '*.patch' -printf '%P ' | sed 's/[[:space:]]*$//')"
          supported_targets="x86_64-unknown-linux-musl, x86_64-apple-darwin, aarch64-apple-darwin, x86_64-pc-windows-msvc"

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
          echo "upstream_sha=${upstream_sha}" >> "${GITHUB_OUTPUT}"
          echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
          echo "patch_files=${patch_files}" >> "${GITHUB_OUTPUT}"
          echo "supported_targets=${supported_targets}" >> "${GITHUB_OUTPUT}"

  verify:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532
        with:
          tool: just@1.51.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.3"

      - name: Install DotSlash
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Clone upstream tag
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ needs.prepare.outputs.upstream_tag }}" https://github.com/openai/codex.git upstream

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Verify patches and upstream checks
        shell: bash
        env:
          UPSTREAM_TEST_COMMAND: ${{ vars.UPSTREAM_TEST_COMMAND }}
          UPSTREAM_BUILD_COMMAND: ${{ vars.UPSTREAM_BUILD_COMMAND }}
          UPSTREAM_ARTIFACT_GLOB: ${{ vars.UPSTREAM_ARTIFACT_GLOB }}
          UPSTREAM_TARGET: x86_64-unknown-linux-musl
          SKIP_ARTIFACT_COLLECTION: "1"
        run: |
          set -euo pipefail
          export UPSTREAM_TEST_COMMAND="${UPSTREAM_TEST_COMMAND:-python3 .github/scripts/verify_cargo_workspace_manifests.py && python3 .github/scripts/verify_tui_core_boundary.py && python3 .github/scripts/verify_bazel_clippy_lints.py && python3 -m unittest discover -s scripts/codex_package -p 'test_*.py' && python3 -m unittest discover -s scripts/install -p 'test_*.py' && just fmt-check && pnpm run format}"
          ./scripts/build-release.sh upstream dist
  build:
    needs:
      - prepare
      - verify
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO: upstream also publishes Linux arm64 and Windows arm64 bundles
          # on custom runners. Keep this matrix to GitHub-hosted targets until
          # the matching runner pool and signing flow are available here.
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binaries: "codex codex-code-mode-host codex-responses-api-proxy bwrap"
          - runner: macos-15
            target: x86_64-apple-darwin
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
          - runner: macos-15
            target: aarch64-apple-darwin
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install just
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532
        with:
          tool: just@1.51.0

      - name: Install DotSlash
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a

      - name: Set up Zig
        if: ${{ contains(matrix.target, 'linux-musl') }}
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Clone upstream tag
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ needs.prepare.outputs.upstream_tag }}" https://github.com/openai/codex.git upstream

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends binutils pkg-config libcap-dev ca-certificates curl musl-tools g++ clang libc++-dev libc++abi-dev lld xz-utils

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Build patched release
        shell: bash
        env:
          UPSTREAM_TEST_COMMAND: ${{ vars.UPSTREAM_TEST_COMMAND }}
          UPSTREAM_BUILD_COMMAND: ${{ vars.UPSTREAM_BUILD_COMMAND }}
          UPSTREAM_ARTIFACT_GLOB: ${{ vars.UPSTREAM_ARTIFACT_GLOB }}
          UPSTREAM_TARGET: ${{ matrix.target }}
          UPSTREAM_BINARIES: ${{ matrix.binaries }}
          SKIP_UPSTREAM_TESTS: "1"
        run: |
          set -euo pipefail
          ./scripts/build-release.sh upstream "dist/${{ matrix.target }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ matrix.target }}/
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          patch_files="${{ needs.prepare.outputs.patch_files }}"
          if [[ -z "${patch_files}" ]]; then
            patch_files="none"
          fi
          cat > RELEASE_NOTES.md <<EOF
          # Codex Fixes ${{ needs.prepare.outputs.patched_tag }}

          - Upstream Codex version/tag: ${{ needs.prepare.outputs.upstream_tag }}
          - Upstream commit SHA: ${{ needs.prepare.outputs.upstream_sha }}
          - Patch files applied: ${patch_files}
          - Build date: ${{ needs.prepare.outputs.build_date }}
          - Supported platforms: ${{ needs.prepare.outputs.supported_targets }}
          - Checksums: Included in uploaded \`SHA256SUMS\` files

          This is an unofficial patch release and is not affiliated with or endorsed by OpenAI.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.patched_tag }}
          name: ${{ needs.prepare.outputs.patched_tag }}
          body_path: RELEASE_NOTES.md
          files: release-artifacts/**/*
