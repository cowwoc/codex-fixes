name: Upstream release check

on:
  workflow_call:
    inputs:
      upstream_tag:
        description: "Optional upstream tag override."
        required: false
        type: string
      patch_release_number:
        description: "Optional patched release suffix override. Defaults to 0."
        required: false
        type: string
      artifact_run_id:
        description: "Optional completed build run to reuse for publishing."
        required: false
        type: string
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Optional upstream tag override."
        required: false
        type: string
      patch_release_number:
        description: "Optional patched release suffix override. Defaults to 0."
        required: false
        type: string
      artifact_run_id:
        description: "Optional completed build run to reuse for publishing."
        required: false
        type: string

concurrency:
  group: upstream-release-check
  cancel-in-progress: false

jobs:
  prepare:
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      upstream_tag: ${{ steps.prepare.outputs.upstream_tag }}
      upstream_sha: ${{ steps.prepare.outputs.upstream_sha }}
      patched_tag: ${{ steps.prepare.outputs.patched_tag }}
      release_name: ${{ steps.prepare.outputs.release_name }}
      build_date: ${{ steps.prepare.outputs.build_date }}
      patch_files: ${{ steps.prepare.outputs.patch_files }}
      supported_targets: ${{ steps.prepare.outputs.supported_targets }}
      patch_hash: ${{ steps.prepare.outputs.patch_hash }}
      artifact_run_id: ${{ steps.prepare.outputs.artifact_run_id }}
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download metadata for artifact reuse
        if: ${{ inputs.artifact_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: reused-metadata
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine upstream release
        id: prepare
        shell: bash
        env:
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag || '' }}
          INPUT_PATCH_RELEASE_NUMBER: ${{ inputs.patch_release_number || '' }}
          INPUT_ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          set -euo pipefail

          active_run_ids="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs" \
              --paginate \
              -f status=in_progress \
              -q '.workflow_runs[]
                | select(.name == env.GITHUB_WORKFLOW)
                | .id' \
              2>/dev/null | grep -E '^[0-9]+$' || true
          )"
          if [[ -z "${INPUT_ARTIFACT_RUN_ID}" && -n "${active_run_ids}" ]]; then
            oldest_active_run_id="$(printf '%s\n' "${active_run_ids}" | sort -n | head -n1)"
            if [[ -n "${oldest_active_run_id}" && "${oldest_active_run_id}" != "${GITHUB_RUN_ID}" ]]; then
              echo "Another ${GITHUB_WORKFLOW} run is already active (${oldest_active_run_id}); skipping duplicate run ${GITHUB_RUN_ID}."
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
              echo "upstream_tag=" >> "${GITHUB_OUTPUT}"
              echo "patched_tag=" >> "${GITHUB_OUTPUT}"
              echo "release_name=" >> "${GITHUB_OUTPUT}"
              echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"
              echo "patch_files=" >> "${GITHUB_OUTPUT}"
              echo "supported_targets=" >> "${GITHUB_OUTPUT}"
              echo "patch_hash=" >> "${GITHUB_OUTPUT}"
              echo "artifact_run_id=" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          patch_hash="$(find patches -type f -name '*.patch' -print0 | sort -z | xargs -0 -r sha256sum | sha256sum | awk '{print $1}')"

          if [[ -n "${INPUT_ARTIFACT_RUN_ID}" ]]; then
            metadata_file="$(find reused-metadata -type f -name '*.json' -print -quit)"
            if [[ -z "${metadata_file}" ]]; then
              echo "ERROR: build run ${INPUT_ARTIFACT_RUN_ID} did not provide release metadata." >&2
              exit 1
            fi

            upstream_tag="$(jq -er '.upstream_tag' "${metadata_file}")"
            upstream_sha="$(jq -er '.upstream_sha' "${metadata_file}")"
            patched_tag="$(jq -er '.patched_tag' "${metadata_file}")"
            release_name="$(jq -er '.release_name // (.patched_tag | sub("^rust-v"; ""))' "${metadata_file}")"
            build_date="$(jq -er '.build_date' "${metadata_file}")"
            patch_files="$(jq -er '.patch_files' "${metadata_file}")"
            supported_targets="$(jq -er '.supported_targets' "${metadata_file}")"
            metadata_patch_hash="$(jq -er '.patch_hash' "${metadata_file}")"

            if [[ "${patch_hash}" != "${metadata_patch_hash}" ]]; then
              echo "ERROR: current patch files do not match build run ${INPUT_ARTIFACT_RUN_ID}." >&2
              exit 1
            fi
            if gh release view "${patched_tag}" >/dev/null 2>&1; then
              echo "Patched release ${patched_tag} already exists."
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
              echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
              echo "upstream_sha=${upstream_sha}" >> "${GITHUB_OUTPUT}"
              echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
              echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
              echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
              echo "patch_files=${patch_files}" >> "${GITHUB_OUTPUT}"
              echo "supported_targets=${supported_targets}" >> "${GITHUB_OUTPUT}"
              echo "patch_hash=${patch_hash}" >> "${GITHUB_OUTPUT}"
              echo "artifact_run_id=${INPUT_ARTIFACT_RUN_ID}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "Reusing final artifacts from build run ${INPUT_ARTIFACT_RUN_ID} for ${patched_tag}."
            echo "should_release=true" >> "${GITHUB_OUTPUT}"
            echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
            echo "upstream_sha=${upstream_sha}" >> "${GITHUB_OUTPUT}"
            echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
            echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
            echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
            echo "patch_files=${patch_files}" >> "${GITHUB_OUTPUT}"
            echo "supported_targets=${supported_targets}" >> "${GITHUB_OUTPUT}"
            echo "patch_hash=${patch_hash}" >> "${GITHUB_OUTPUT}"
            echo "artifact_run_id=${INPUT_ARTIFACT_RUN_ID}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          patch_release="${INPUT_PATCH_RELEASE_NUMBER:-0}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ -n "${INPUT_UPSTREAM_TAG:-}" ]]; then
            upstream_tag="${INPUT_UPSTREAM_TAG}"
          else
            upstream_tag="$(./scripts/check-upstream-release.sh openai/codex | jq -r '.tag_name')"
          fi

          if [[ -z "${upstream_tag}" || "${upstream_tag}" == "null" ]]; then
            echo "ERROR: failed to determine upstream tag" >&2
            exit 1
          fi

          patched_tag="${upstream_tag}.${patch_release}"
          release_name="${patched_tag#rust-v}"
          failure_marker_name="failed-upstream-release-${patched_tag}-${GITHUB_SHA}"
          export failure_marker_name

          if gh release view "${patched_tag}" >/dev/null 2>&1; then
            echo "Patched release ${patched_tag} already exists."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
            echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
            echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
            echo "patch_files=$(find patches -type f -name '*.patch' -printf '%P ' | sed 's/[[:space:]]*$//')" >> "${GITHUB_OUTPUT}"
            echo "patch_hash=${patch_hash}" >> "${GITHUB_OUTPUT}"
            echo "artifact_run_id=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            failure_marker_id="$(
              gh api \
                "repos/${GITHUB_REPOSITORY}/actions/artifacts" \
                --paginate \
                -q '.artifacts[]
                  | select(.expired == false and .name == env.failure_marker_name)
                  | .id' \
                2>/dev/null | head -n1 || true
            )"
            if [[ -n "${failure_marker_id}" ]]; then
              echo "A previous release attempt for ${patched_tag} failed on this workflow revision (${GITHUB_SHA}); skipping scheduled retry."
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
              echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
              echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
              echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
              echo "patch_files=$(find patches -type f -name '*.patch' -printf '%P ' | sed 's/[[:space:]]*$//')" >> "${GITHUB_OUTPUT}"
              echo "supported_targets=" >> "${GITHUB_OUTPUT}"
              echo "patch_hash=${patch_hash}" >> "${GITHUB_OUTPUT}"
              echo "artifact_run_id=" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          git clone --depth 1 --branch "${upstream_tag}" https://github.com/openai/codex.git upstream
          upstream_sha="$(git -C upstream rev-parse HEAD)"
          patch_files="$(find patches -type f -name '*.patch' -printf '%P ' | sed 's/[[:space:]]*$//')"
          supported_targets="x86_64-unknown-linux-musl, aarch64-unknown-linux-musl, x86_64-apple-darwin, aarch64-apple-darwin, x86_64-pc-windows-msvc, aarch64-pc-windows-msvc"

          jq -n \
            --arg artifact_run_id "${GITHUB_RUN_ID}" \
            --arg upstream_tag "${upstream_tag}" \
            --arg upstream_sha "${upstream_sha}" \
            --arg patched_tag "${patched_tag}" \
            --arg release_name "${release_name}" \
            --arg build_date "${build_date}" \
            --arg patch_files "${patch_files}" \
            --arg patch_hash "${patch_hash}" \
            --arg supported_targets "${supported_targets}" \
            '{schema_version: 1, artifact_run_id: $artifact_run_id, upstream_tag: $upstream_tag, upstream_sha: $upstream_sha, patched_tag: $patched_tag, release_name: $release_name, build_date: $build_date, patch_files: $patch_files, patch_hash: $patch_hash, supported_targets: $supported_targets}' \
            > release-metadata.json

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
          echo "upstream_sha=${upstream_sha}" >> "${GITHUB_OUTPUT}"
          echo "patched_tag=${patched_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
          echo "patch_files=${patch_files}" >> "${GITHUB_OUTPUT}"
          echo "supported_targets=${supported_targets}" >> "${GITHUB_OUTPUT}"
          echo "patch_hash=${patch_hash}" >> "${GITHUB_OUTPUT}"
          echo "artifact_run_id=${GITHUB_RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Upload build metadata
        if: ${{ steps.prepare.outputs.should_release == 'true' && inputs.artifact_run_id == '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-metadata
          path: release-metadata.json
          retention-days: 30

  verify:
    needs: prepare
    if: >-
      ${{
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.outputs.artifact_run_id == github.run_id
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Record job start
        id: timing_start
        shell: bash
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Determine pnpm store path
        id: pnpm_store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.3"

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ needs.prepare.outputs.upstream_tag }}

      - name: Resolve upstream Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' upstream/codex-rs/rust-toolchain.toml)"
          if [[ -z "${channel}" ]]; then
            echo "Failed to resolve channel from upstream/codex-rs/rust-toolchain.toml" >&2
            exit 1
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Cache pnpm store
        id: pnpm_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('upstream/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            upstream/codex-rs -> target
          key: verify-${{ needs.prepare.outputs.upstream_sha }}-${{ needs.prepare.outputs.patch_hash }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Verify codex-rs Cargo manifests inherit workspace settings
        run: ./scripts/run-upstream-repo-checks.sh upstream

      - name: Write verify summary
        if: always()
        shell: bash
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
          PNPM_CACHE_HIT: ${{ steps.pnpm_cache.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail
          end_epoch="$(date +%s)"
          duration="$(( end_epoch - START_EPOCH ))"
          {
            echo "## Verify summary"
            echo
            echo "- Outcome: ${{ job.status }}"
            echo "- Duration (seconds): ${duration}"
            echo "- pnpm cache hit: ${PNPM_CACHE_HIT}"
            echo "- Cargo cache: managed by Swatinem/rust-cache"
          } >> "$GITHUB_STEP_SUMMARY"

  build-unix:
    needs:
      - prepare
      - verify
    if: >-
      ${{
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.outputs.artifact_run_id == github.run_id
      }}
    name: Build - ${{ matrix.runner }} - ${{ matrix.target }} - ${{ matrix.bundle }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes || 180 }}
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO: ${{ contains(matrix.target, 'apple-darwin') && 'packed' || 'off' }}
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bundle: primary
            artifact_name: x86_64-unknown-linux-musl
            binaries: "codex codex-code-mode-host codex-responses-api-proxy bwrap"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            bundle: primary
            artifact_name: aarch64-unknown-linux-musl
            binaries: "codex codex-code-mode-host codex-responses-api-proxy bwrap"
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bundle: app-server
            artifact_name: x86_64-unknown-linux-musl-app-server
            binaries: "codex-app-server codex-code-mode-host"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            bundle: app-server
            artifact_name: aarch64-unknown-linux-musl-app-server
            binaries: "codex-app-server codex-code-mode-host"
          - runner: macos-15
            target: x86_64-apple-darwin
            bundle: primary
            timeout_minutes: 180
            artifact_name: x86_64-apple-darwin
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
          - runner: macos-15
            target: x86_64-apple-darwin
            bundle: app-server
            artifact_name: x86_64-apple-darwin-app-server
            binaries: "codex-app-server codex-code-mode-host"
          - runner: macos-15
            target: aarch64-apple-darwin
            bundle: primary
            timeout_minutes: 180
            artifact_name: aarch64-apple-darwin
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
          - runner: macos-15
            target: aarch64-apple-darwin
            bundle: app-server
            artifact_name: aarch64-apple-darwin-app-server
            binaries: "codex-app-server codex-code-mode-host"
    steps:
      - name: Record job start
        id: timing_start
        shell: bash
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Determine pnpm store path
        id: pnpm_store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Print runner specs (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          cpu_model="$(lscpu | awk -F: '/Model name/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
          total_ram="$(awk '/MemTotal/ {printf "%.1f GiB\n", $2 / 1024 / 1024}' /proc/meminfo)"
          echo "Runner: ${RUNNER_NAME:-unknown}"
          echo "OS: $(uname -a)"
          echo "CPU model: ${cpu_model}"
          echo "Logical CPUs: $(nproc)"
          echo "Total RAM: ${total_ram}"
          echo "Disk usage:"
          df -h .

      - name: Print runner specs (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          total_ram="$(sysctl -n hw.memsize | awk '{printf "%.1f GiB\n", $1 / 1024 / 1024 / 1024}')"
          echo "Runner: ${RUNNER_NAME:-unknown}"
          echo "OS: $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "Hardware model: $(sysctl -n hw.model)"
          echo "CPU architecture: $(uname -m)"
          echo "Logical CPUs: $(sysctl -n hw.logicalcpu)"
          echo "Physical CPUs: $(sysctl -n hw.physicalcpu)"
          echo "Total RAM: ${total_ram}"
          echo "Disk usage:"
          df -h .

      - name: Set up Zig
        if: ${{ contains(matrix.target, 'linux-musl') }}
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0
          use-cache: false

      - name: Prepare Linux APT cache directories
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /var/cache/apt/archives /var/lib/apt/lists
          sudo chown -R "$USER:$USER" /var/cache/apt /var/lib/apt/lists

      - name: Restore APT cache
        if: ${{ runner.os == 'Linux' }}
        id: apt_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-${{ matrix.target }}-v1

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends binutils pkg-config libcap-dev

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ needs.prepare.outputs.upstream_tag }}

      - name: Resolve upstream Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' upstream/codex-rs/rust-toolchain.toml)"
          if [[ -z "${channel}" ]]; then
            echo "Failed to resolve channel from upstream/codex-rs/rust-toolchain.toml" >&2
            exit 1
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Cache pnpm store
        id: pnpm_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('upstream/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            upstream/codex-rs -> target
          key: build-${{ matrix.target }}-${{ matrix.bundle }}-${{ needs.prepare.outputs.upstream_sha }}-${{ needs.prepare.outputs.patch_hash }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache rusty_v8 artifacts
        id: rusty_v8_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .cache/rusty_v8
          key: rusty-v8-${{ matrix.target }}-${{ needs.prepare.outputs.upstream_tag }}

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Use hermetic Cargo home (musl)
        if: ${{ contains(matrix.target, 'linux-musl') }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Configure Linux musl toolchain
        if: ${{ contains(matrix.target, 'linux-musl') }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          bash upstream/.github/scripts/install-musl-build-tools.sh

      - name: Disable aws-lc jitter entropy (musl)
        if: ${{ contains(matrix.target, 'linux-musl') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"

      - name: Build patched release
        shell: bash
        run: |
          set -euo pipefail
          export UPSTREAM_TARGET="${{ matrix.target }}"
          export UPSTREAM_BINARIES="${{ matrix.binaries }}"
          export SKIP_UPSTREAM_TESTS=1
          export SKIP_ARTIFACT_COLLECTION=1
          export RUSTY_V8_CACHE_DIR="${GITHUB_WORKSPACE}/.cache/rusty_v8"
          ./scripts/build-release.sh upstream "${RUNNER_TEMP}/upstream-build-output"

      - name: Upload Cargo timings
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-timings-rust-release-${{ matrix.target }}-${{ matrix.bundle }}
          path: ${{ env.CARGO_TARGET_DIR }}/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn

      - name: Build symbols archive and strip binaries
        shell: bash
        run: |
          set -euo pipefail
          binaries=()
          for binary in ${{ matrix.binaries }}; do
            if [[ "$binary" == "bwrap" ]]; then
              continue
            fi
            binaries+=("$binary")
          done
          bash "${GITHUB_WORKSPACE}/.github/scripts/archive-release-symbols-and-strip-binaries.sh" \
            --target "${{ matrix.target }}" \
            --artifact-name "${{ matrix.artifact_name }}" \
            --release-dir "${CARGO_TARGET_DIR}/${{ matrix.target }}/release" \
            --archive-dir "symbols-dist/${{ matrix.artifact_name }}" \
            --binaries "${binaries[*]}"

      - name: Upload symbols archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}-symbols
          path: symbols-dist/${{ matrix.artifact_name }}/*
          if-no-files-found: error

      - name: Cosign Linux artifacts
        if: ${{ contains(matrix.target, 'linux') }}
        uses: ./.github/actions/linux-code-sign
        with:
          target: ${{ matrix.target }}
          artifacts-dir: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release
          binaries: ${{ matrix.binaries }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${CARGO_TARGET_DIR}/${{ matrix.target }}/release"
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"

          for binary in ${{ matrix.binaries }}; do
            if [[ "${{ matrix.bundle }}" == "app-server" && "$binary" == "codex-code-mode-host" ]]; then
              continue
            fi
            cp "${release_dir}/${binary}" "$dest/${binary}-${{ matrix.target }}"
            if [[ "${{ matrix.target }}" == *linux* && -f "${release_dir}/${binary}.sigstore" ]]; then
              cp "${release_dir}/${binary}.sigstore" "$dest/${binary}-${{ matrix.target }}.sigstore"
            fi
          done

          if [[ "${{ matrix.target }}" == *linux* && "${{ matrix.bundle }}" == "primary" ]]; then
            bundle_root="${RUNNER_TEMP}/codex-${{ matrix.target }}-bundle"
            rm -rf "$bundle_root"
            mkdir -p "$bundle_root/codex-resources"
            cp "$dest/codex-${{ matrix.target }}" "$bundle_root/codex"
            cp "$dest/codex-code-mode-host-${{ matrix.target }}" "$bundle_root/codex-code-mode-host"
            cp "$dest/bwrap-${{ matrix.target }}" "$bundle_root/codex-resources/bwrap"
            chmod 0755 \
              "$bundle_root/codex" \
              "$bundle_root/codex-code-mode-host" \
              "$bundle_root/codex-resources/bwrap"
            tar -C "$bundle_root" -cf - codex codex-code-mode-host codex-resources/bwrap |
              zstd -T0 -19 -o "$dest/codex-${{ matrix.target }}-bundle.tar.zst"
          fi

      - name: Build Codex package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BUNDLE: ${{ matrix.bundle }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/.github/scripts/build-codex-package-archive.sh" \
            --target "$TARGET" \
            --bundle "$BUNDLE" \
            --entrypoint-dir "${CARGO_TARGET_DIR}/${TARGET}/release" \
            --archive-dir "dist/${TARGET}"

      - name: Build Python runtime wheel
        if: ${{ matrix.bundle == 'primary' }}
        shell: bash
        env:
          CODEX_VERSION: ${{ needs.prepare.outputs.patched_tag }}
        run: |
          set -euo pipefail

          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              platform_tag="macosx_11_0_arm64"
              ;;
            x86_64-apple-darwin)
              platform_tag="macosx_10_9_x86_64"
              ;;
            aarch64-unknown-linux-musl)
              platform_tag="manylinux_2_17_aarch64"
              ;;
            x86_64-unknown-linux-musl)
              platform_tag="manylinux_2_17_x86_64"
              ;;
            *)
              echo "No Python runtime wheel platform tag for ${{ matrix.target }}"
              exit 1
              ;;
          esac

          python3 -m venv "${RUNNER_TEMP}/python-runtime-build-venv"
          "${RUNNER_TEMP}/python-runtime-build-venv/bin/python" -m pip install build

          stage_dir="${RUNNER_TEMP}/openai-codex-cli-bin-${{ matrix.target }}"
          wheel_dir="${GITHUB_WORKSPACE}/python-runtime-dist/${{ matrix.target }}"
          python3 \
            "${GITHUB_WORKSPACE}/sdk/python/scripts/update_sdk_artifacts.py" \
            stage-runtime \
            "$stage_dir" \
            "dist/${{ matrix.target }}/codex-package-${{ matrix.target }}.tar.gz" \
            --codex-version "$CODEX_VERSION" \
            --platform-tag "$platform_tag"
          "${RUNNER_TEMP}/python-runtime-build-venv/bin/python" -m build --wheel --outdir "$wheel_dir" "$stage_dir"

      - name: Upload Python runtime wheel
        if: ${{ matrix.bundle == 'primary' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-runtime-wheel-${{ matrix.target }}
          path: python-runtime-dist/${{ matrix.target }}/*.whl
          if-no-files-found: error

      - name: Compress artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          for f in "$dest"/*; do
            base="$(basename "$f")"
            if [[ "$base" == *.tar.gz || "$base" == *.tar.zst || "$base" == *.zip || "$base" == *.dmg ]]; then
              continue
            fi
            if [[ "$base" == *.sigstore ]]; then
              continue
            fi
            tar -C "$dest" -czf "$dest/${base}.tar.gz" "$base"
            zstd -T0 -19 --rm "$dest/$base"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "dist/${{ matrix.target }}"
          sha256sum ./* > SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.target }}/
          if-no-files-found: error

      - name: Write build summary
        if: always()
        shell: bash
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
          PNPM_CACHE_HIT: ${{ steps.pnpm_cache.outputs.cache-hit || 'false' }}
          APT_CACHE_HIT: ${{ steps.apt_cache.outputs.cache-hit || 'n/a' }}
          RUSTY_V8_CACHE_HIT: ${{ steps.rusty_v8_cache.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail
          end_epoch="$(date +%s)"
          duration="$(( end_epoch - START_EPOCH ))"
          {
            echo "## Build summary"
            echo
            echo "- Target: ${{ matrix.target }}"
            echo "- Bundle: ${{ matrix.bundle }}"
            echo "- Outcome: ${{ job.status }}"
            echo "- Duration (seconds): ${duration}"
            echo "- pnpm cache hit: ${PNPM_CACHE_HIT}"
            echo "- APT cache hit: ${APT_CACHE_HIT}"
            echo "- rusty_v8 cache hit: ${RUSTY_V8_CACHE_HIT}"
            echo "- Cargo cache: managed by Swatinem/rust-cache"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save APT cache
        if: ${{ always() && !cancelled() && runner.os == 'Linux' }}
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-${{ matrix.target }}-v1

  build-windows-binaries:
    needs:
      - prepare
      - verify
    if: >-
      ${{
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.outputs.artifact_run_id == github.run_id
      }}
    name: Build Windows binaries - ${{ matrix.target }} - ${{ matrix.bundle }}
    runs-on: windows-latest
    timeout-minutes: ${{ matrix.timeout_minutes || 180 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            bundle: primary
            timeout_minutes: 180
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
          - target: aarch64-pc-windows-msvc
            bundle: primary
            timeout_minutes: 180
            binaries: "codex codex-code-mode-host codex-responses-api-proxy"
          - target: x86_64-pc-windows-msvc
            bundle: helpers
            binaries: "codex-windows-sandbox-setup codex-command-runner"
          - target: aarch64-pc-windows-msvc
            bundle: helpers
            binaries: "codex-windows-sandbox-setup codex-command-runner"
          - target: x86_64-pc-windows-msvc
            bundle: app-server
            binaries: "codex-app-server codex-code-mode-host"
          - target: aarch64-pc-windows-msvc
            bundle: app-server
            binaries: "codex-app-server codex-code-mode-host"
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ needs.prepare.outputs.upstream_tag }}

      - name: Print runner specs (Windows)
        shell: powershell
        run: |
          $computer = Get-CimInstance Win32_ComputerSystem
          $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
          $ramGiB = [math]::Round($computer.TotalPhysicalMemory / 1GB, 1)
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"
          Write-Host "CPU: $($cpu.Name)"
          Write-Host "Logical CPUs: $($computer.NumberOfLogicalProcessors)"
          Write-Host "Physical CPUs: $($computer.NumberOfProcessors)"
          Write-Host "Total RAM: $ramGiB GiB"
          Write-Host "Disk usage:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize Name, @{Name='Size(GB)';Expression={[math]::Round(($_.Used + $_.Free) / 1GB, 1)}}, @{Name='Free(GB)';Expression={[math]::Round($_.Free / 1GB, 1)}}

      - name: Resolve upstream Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' upstream/codex-rs/rust-toolchain.toml)"
          if [[ -z "${channel}" ]]; then
            echo "Failed to resolve channel from upstream/codex-rs/rust-toolchain.toml" >&2
            exit 1
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Configure LLVM linker
        uses: ./.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.target }}

      - name: Ensure requested Rust target is installed
        shell: bash
        run: |
          set -euo pipefail
          rustup target add "${{ matrix.target }}" --toolchain "${{ steps.rust_toolchain.outputs.channel }}"
          rustup target list --installed

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            upstream/codex-rs -> target
          key: build-windows-${{ matrix.target }}-${{ matrix.bundle }}-${{ needs.prepare.outputs.upstream_sha }}-${{ needs.prepare.outputs.patch_hash }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cargo build (Windows binaries)
        working-directory: upstream/codex-rs
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          if [[ "$target" == "x86_64-pc-windows-msvc" ]]; then
            export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC
          fi
          build_args=()
          for binary in ${{ matrix.binaries }}; do
            build_args+=(--bin "$binary")
          done
          cargo build --target "$target" --release --timings "${build_args[@]}"

      - name: Upload Cargo timings
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-timings-rust-release-windows-${{ matrix.target }}-${{ matrix.bundle }}
          path: ${{ env.CARGO_TARGET_DIR }}/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn

      - name: Stage Windows binaries
        working-directory: upstream/codex-rs
        shell: bash
        run: |
          set -euo pipefail
          release_dir="$CARGO_TARGET_DIR/${{ matrix.target }}/release"
          output_dir="$release_dir/staged-${{ matrix.bundle }}"
          mkdir -p "$output_dir"
          for binary in ${{ matrix.binaries }}; do
            pdb_name="${binary//-/_}"
            pdb_path="$release_dir/${pdb_name}.pdb"
            if [[ ! -f "$pdb_path" ]]; then
              pdb_path="$release_dir/${binary}.pdb"
            fi
            cp "$release_dir/${binary}.exe" "$output_dir/${binary}.exe"
            cp "$pdb_path" "$output_dir/${binary}.pdb"
          done

      - name: Upload Windows binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-binaries-${{ matrix.target }}-${{ matrix.bundle }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/staged-${{ matrix.bundle }}/*

  build-windows-symbols:
    needs:
      - build-windows-binaries
      - prepare
    if: >-
      ${{
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.outputs.artifact_run_id == github.run_id
      }}
    name: Build Windows symbols - ${{ matrix.target }}
    runs-on: ubuntu-latest
    env:
      WINDOWS_BINARIES: "codex codex-code-mode-host codex-responses-api-proxy codex-windows-sandbox-setup codex-command-runner codex-app-server"
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci

      - name: Download prebuilt Windows binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: windows-binaries-${{ matrix.target }}-*
          merge-multiple: true
          path: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release

      - name: Build symbols archive
        shell: bash
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/.github/scripts/archive-release-symbols-and-strip-binaries.sh" \
            --target "${{ matrix.target }}" \
            --artifact-name "${{ matrix.target }}" \
            --release-dir "${CARGO_TARGET_DIR}/${{ matrix.target }}/release" \
            --archive-dir "symbols-dist/${{ matrix.target }}" \
            --binaries "${WINDOWS_BINARIES}"

      - name: Upload symbols archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.target }}-symbols
          path: symbols-dist/${{ matrix.target }}/*
          if-no-files-found: error

  build-windows-package:
    needs:
      - build-windows-binaries
      - build-windows-symbols
      - prepare
    if: >-
      ${{
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.outputs.artifact_run_id == github.run_id
      }}
    name: Build - windows-latest - ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    env:
      WINDOWS_BINARIES: "codex codex-code-mode-host codex-responses-api-proxy codex-windows-sandbox-setup codex-command-runner codex-app-server"
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ needs.prepare.outputs.upstream_tag }}

      - name: Download prebuilt Windows primary binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-primary
          path: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release

      - name: Download prebuilt Windows helper binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-helpers
          path: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release

      - name: Download prebuilt Windows app-server binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-app-server
          path: ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"
          for binary in ${WINDOWS_BINARIES}; do
            cp "$CARGO_TARGET_DIR/${{ matrix.target }}/release/${binary}.exe" \
              "$dest/${binary}-${{ matrix.target }}.exe"
          done

      - name: Build Codex package archives
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive_script="${GITHUB_WORKSPACE}/.github/scripts/build-codex-package-archive.sh"
          temp_root="${RUNNER_TEMP}/codex-package-archives"

          mkdir -p "$temp_root/primary" "$temp_root/app-server"
          printf '%s\0' primary app-server |
            xargs -0 -P0 -I{} env \
              TMPDIR="$temp_root/{}" \
              TMP="$temp_root/{}" \
              TEMP="$temp_root/{}" \
              bash "$archive_script" \
                --target "$target" \
                --bundle "{}" \
                --entrypoint-dir "$CARGO_TARGET_DIR/$target/release" \
                --archive-dir "dist/$target"

      - name: Build Python runtime wheel
        shell: bash
        env:
          CODEX_VERSION: ${{ needs.prepare.outputs.patched_tag }}
        run: |
          set -euo pipefail

          python -m venv "${RUNNER_TEMP}/python-runtime-build-venv"
          "${RUNNER_TEMP}/python-runtime-build-venv/Scripts/python.exe" -m pip install build

          case "${{ matrix.target }}" in
            aarch64-pc-windows-msvc)
              platform_tag="win_arm64"
              ;;
            x86_64-pc-windows-msvc)
              platform_tag="win_amd64"
              ;;
            *)
              echo "No Python runtime wheel platform tag for ${{ matrix.target }}"
              exit 1
              ;;
          esac

          stage_dir="${RUNNER_TEMP}/openai-codex-cli-bin-${{ matrix.target }}"
          wheel_dir="${GITHUB_WORKSPACE}/python-runtime-dist/${{ matrix.target }}"
          python "${GITHUB_WORKSPACE}/sdk/python/scripts/update_sdk_artifacts.py" \
            stage-runtime \
            "$stage_dir" \
            "dist/${{ matrix.target }}/codex-package-${{ matrix.target }}.tar.gz" \
            --codex-version "$CODEX_VERSION" \
            --platform-tag "$platform_tag"
          "${RUNNER_TEMP}/python-runtime-build-venv/Scripts/python.exe" -m build --wheel --outdir "$wheel_dir" "$stage_dir"

      - name: Upload Python runtime wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-runtime-wheel-${{ matrix.target }}
          path: python-runtime-dist/${{ matrix.target }}/*.whl
          if-no-files-found: error

      - name: Compress artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          repo_root=$PWD
          target="${{ matrix.target }}"
          zstd_wrapper="${GITHUB_WORKSPACE}/upstream/.github/workflows/zstd"
          export dest repo_root target zstd_wrapper
          printf '%s\0' "$dest"/* |
            xargs -0 -n1 -P2 bash -c '
            set -euo pipefail
            f=$1
            base="$(basename "$f")"
            if [[ "$base" == *.tar.gz || "$base" == *.tar.zst || "$base" == *.zip || "$base" == *.dmg ]]; then
              exit 0
            fi
            if [[ "$base" == *.sigstore ]]; then
              exit 0
            fi
            tar -C "$dest" -czf "$dest/${base}.tar.gz" "$base"
            if [[ "$base" == "codex-${target}.exe" ]]; then
              bundle_dir="$(mktemp -d)"
              cp "$dest/$base" "$bundle_dir/$base"
              cp "$dest/codex-command-runner-${target}.exe" "$bundle_dir/codex-command-runner.exe"
              cp "$dest/codex-windows-sandbox-setup-${target}.exe" "$bundle_dir/codex-windows-sandbox-setup.exe"
              (cd "$bundle_dir" && 7z a "$repo_root/$dest/${base}.zip" .)
              rm -rf "$bundle_dir"
            else
              (cd "$dest" && 7z a "${base}.zip" "$base")
            fi
            "$zstd_wrapper" -T0 -19 "$dest/$base"
          ' _

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "dist/${{ matrix.target }}"
          sha256sum ./* > SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}/
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build-unix
      - build-windows-package
      - build-windows-symbols
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.should_release == 'true' &&
        (
          needs.prepare.outputs.artifact_run_id != github.run_id ||
          (
            needs['build-unix'].result == 'success' &&
            needs['build-windows-package'].result == 'success' &&
            needs['build-windows-symbols'].result == 'success'
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download target artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
          run-id: ${{ needs.prepare.outputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Match upstream's release workflow: only download final target
          # packages, not the intermediate build and timing artifacts.
          pattern: "{aarch64,x86_64}-{apple-darwin{,-app-server},unknown-linux-musl{,-app-server},pc-windows-msvc}"

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-stage
          declare -A seen=()
          while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            if [[ "$base" == "cargo-timing.html" || "$base" == "SHA256SUMS" ]]; then
              continue
            fi
            case "$base" in
              codex-package-*.tar.gz|codex-app-server-package-*.tar.gz)
                staged_name="$base"
                ;;
              *)
                continue
                ;;
            esac
            if [[ -n "${seen[$staged_name]+x}" ]]; then
              echo "ERROR: duplicate release asset name after staging: ${staged_name}" >&2
              exit 1
            fi
            seen[$staged_name]=1
            cp "$file" "release-stage/${staged_name}"
          done < <(find release-artifacts -type f -print0 | sort -z)

      - name: Generate consolidated checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-stage
            find . -maxdepth 1 -type f -printf '%P\n' | LC_ALL=C sort | xargs sha256sum > SHA256SUMS.release.txt
          )

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          patch_files="${{ needs.prepare.outputs.patch_files }}"
          if [[ -z "${patch_files}" ]]; then
            patch_files="none"
          fi
          patch_list=""
          if [[ "${patch_files}" == "none" ]]; then
            patch_list="- None"
          else
            for patch_file in ${patch_files}; do
              patch_list+="- \`${patch_file}\`"$'\n'
            done
            patch_list="${patch_list%$'\n'}"
          fi
          cat > RELEASE_NOTES.md <<EOF
          # Codex Fixes ${{ needs.prepare.outputs.release_name }}

          > A public patched Codex build for users who need targeted fixes sooner than the upstream release cycle.

          > **Unofficial:** This distribution is not affiliated with or endorsed by OpenAI.

          ## Start here

          1. Choose the recommended package for your platform below.
          2. Download it from the **Assets** section at the bottom of this page.
          3. Verify the download with \`SHA256SUMS.release.txt\` before extracting it.

          | Platform | Asset |
          | --- | --- |
          | Linux x86_64 | \`codex-package-x86_64-unknown-linux-musl.tar.gz\` |
          | Linux ARM64 | \`codex-package-aarch64-unknown-linux-musl.tar.gz\` |
          | macOS Intel | \`codex-package-x86_64-apple-darwin.tar.gz\` |
          | macOS Apple Silicon | \`codex-package-aarch64-apple-darwin.tar.gz\` |
          | Windows x86_64 | \`codex-package-x86_64-pc-windows-msvc.tar.gz\` |
          | Windows ARM64 | \`codex-package-aarch64-pc-windows-msvc.tar.gz\` |

          ## What changed

          This build is based on upstream Codex \`${{ needs.prepare.outputs.upstream_tag }}\` at commit \`${{ needs.prepare.outputs.upstream_sha }}\`.

          **Patches applied**

          ${patch_list}

          ## Build details

          - Build date: \`${{ needs.prepare.outputs.build_date }}\`
          - Supported targets: \`${{ needs.prepare.outputs.supported_targets }}\`
          - Complete release checksums: \`SHA256SUMS.release.txt\`

          This release is intended as a temporary patch layer; patches are removed once the corresponding fix is available upstream.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.patched_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          files: release-stage/*

  record-failure-marker:
    needs:
      - prepare
      - build-unix
      - build-windows-package
      - build-windows-symbols
      - publish
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.should_release == 'true' &&
        !cancelled() &&
        needs.publish.result != 'success'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write failure marker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p failure-marker
          cat > failure-marker/README.txt <<EOF
          Upstream release check failed.
          Repository: ${{ github.repository }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Workflow commit: ${{ github.sha }}
          Upstream tag: ${{ needs.prepare.outputs.upstream_tag }}
          Patched tag: ${{ needs.prepare.outputs.patched_tag }}
          Recorded at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload failure marker
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: failed-upstream-release-${{ needs.prepare.outputs.patched_tag }}-${{ github.sha }}
          path: failure-marker/README.txt
          retention-days: 30
