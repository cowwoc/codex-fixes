name: Close unfunded issues

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  issues: write

jobs:
  close-unfunded:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues that do not meet policy
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set([
              "funded",
              "quote-request",
              "professional-services",
              "maintainer-approved",
            ]);

            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((label) => label.name);
            const allowedLabel = labels.find((label) => allowed.has(label));
            const exemptAssociations = new Set([
              "OWNER",
              "MEMBER",
              "COLLABORATOR",
            ]);
            const authorAssociation = issue.author_association || "NONE";

            if (allowedLabel) {
              core.info(`Issue kept open because it has label: ${allowedLabel}`);
              return;
            }

            if (exemptAssociations.has(authorAssociation)) {
              core.info(
                `Issue kept open because author association is exempt: ${authorAssociation}`
              );
              return;
            }

            if (issue.state === "closed") {
              core.info("Issue is already closed.");
              return;
            }

            const comment = [
              "Thanks for the report.",
              "",
              "This repository only keeps issues open for credible buyer interest, quote requests, professional-services requests, or issues explicitly approved by the maintainer.",
              "",
              "If you want this issue considered here, request maintainer review first and comment `I am interested in purchasing early access at the specified price` if you want to signal non-binding buyer interest. If an early-access build containing the fix becomes available, the maintainer may publish a Polar checkout link or invoice for immediate delivery up to 30 days before public release. You can also contact the maintainer for a quote.",
              "",
              "- Polar: TODO_POLAR_URL",
              "- GitHub: @cowwoc",
              "- Email: cowwoc2020@gmail.com",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "closed",
            });
