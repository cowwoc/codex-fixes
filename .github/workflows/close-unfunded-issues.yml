name: Close unfunded issues

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions:
  issues: write

jobs:
  close-unfunded:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues that do not meet policy
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set([
              "funded",
              "quote-request",
              "professional-services",
              "maintainer-approved",
            ]);

            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((label) => label.name);
            const allowedLabel = labels.find((label) => allowed.has(label));

            if (allowedLabel) {
              core.info(`Issue kept open because it has label: ${allowedLabel}`);
              return;
            }

            if (issue.state === "closed") {
              core.info("Issue is already closed.");
              return;
            }

            const comment = [
              "Thanks for the report.",
              "",
              "This repository only keeps issues open for funded work, quote requests, professional-services requests, or issues explicitly approved by the maintainer.",
              "",
              "If you want this issue considered here, please fund it through Polar.sh or contact the maintainer for a quote.",
              "",
              "- Polar: TODO_POLAR_URL",
              "- GitHub: @cowwoc",
              "- Email: TODO@example.com",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "closed",
            });
