name: rust-release

on:
  push:
    tags:
      - "rust-v*.*.*"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Optional upstream tag override. Defaults to the pushed rust-v* tag."
        required: false
        type: string
      patch_release_number:
        description: "Optional patched release suffix override. Defaults to 0."
        required: false
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
    steps:
      - id: resolve
        shell: bash
        env:
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_UPSTREAM_TAG}" ]]; then
            upstream_tag="${INPUT_UPSTREAM_TAG}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^rust-v[0-9] ]]; then
            upstream_tag="${GITHUB_REF_NAME}"
          else
            echo "Could not resolve upstream tag." >&2
            exit 1
          fi
          echo "upstream_tag=${upstream_tag}" >> "$GITHUB_OUTPUT"

  release:
    needs: resolve
    uses: ./.github/workflows/upstream-release-check.yml
    with:
      upstream_tag: ${{ needs.resolve.outputs.upstream_tag }}
      patch_release_number: ${{ inputs.patch_release_number || '0' }}
    secrets: inherit
