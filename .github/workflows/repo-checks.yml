name: repo-checks

on:
  workflow_call:
    inputs:
      upstream_ref:
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Record job start
        id: timing_start
        shell: bash
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Git
        shell: bash
        run: git config --global core.autocrlf false

      - uses: ./.github/actions/setup-ci

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine pnpm store path
        id: pnpm_store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.3"

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - name: Cache pnpm store
        id: pnpm_cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('upstream/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            upstream/codex-rs -> target
          key: repo-checks-${{ inputs.upstream_ref || 'main' }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Verify upstream repository checks
        run: ./scripts/run-upstream-repo-checks.sh upstream

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-checks-ubuntu-latest
          path: upstream/codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        shell: bash
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
          PNPM_CACHE_HIT: ${{ steps.pnpm_cache.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail
          end_epoch="$(date +%s)"
          duration="$(( end_epoch - START_EPOCH ))"
          {
            echo "## Repo checks summary"
            echo
            echo "- Outcome: ${{ job.status }}"
            echo "- Duration (seconds): ${duration}"
            echo "- pnpm cache hit: ${PNPM_CACHE_HIT}"
            echo "- Cargo cache: managed by Swatinem/rust-cache"
          } >> "$GITHUB_STEP_SUMMARY"
