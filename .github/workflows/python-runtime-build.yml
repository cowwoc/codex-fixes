name: python-runtime-build

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Patched GitHub release tag to source runtime wheels from."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Patched GitHub release tag to source runtime wheels from."
        required: true
        type: string

jobs:
  build-python-runtime:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download Python runtime wheels from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/python-runtime
          gh release download "$RELEASE_TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "openai_codex_cli_bin-*.whl" \
            --dir dist/python-runtime

          shopt -s nullglob
          wheels=(dist/python-runtime/*.whl)
          if [[ "${#wheels[@]}" -eq 0 ]]; then
            echo "No Python runtime wheels found on release ${RELEASE_TAG}." >&2
            exit 1
          fi
          ls -lh dist/python-runtime

      - name: Upload Python runtime wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-runtime-wheels
          path: dist/python-runtime/*
          if-no-files-found: error
