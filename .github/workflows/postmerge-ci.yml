name: postmerge-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo-deny
    uses: ./.github/workflows/cargo-deny.yml
    with:
      upstream_ref: main
    secrets: inherit

  codespell:
    name: Codespell
    uses: ./.github/workflows/codespell.yml
    secrets: inherit

  repo-checks:
    name: repo-checks
    uses: ./.github/workflows/repo-checks.yml
    with:
      upstream_ref: main
    secrets: inherit

  rust-ci:
    name: rust-ci
    uses: ./.github/workflows/rust-ci.yml
    with:
      upstream_ref: main
    secrets: inherit

  sdk:
    name: sdk
    uses: ./.github/workflows/sdk.yml
    with:
      upstream_ref: main
    secrets: inherit

  bazel:
    name: bazel
    uses: ./.github/workflows/bazel.yml
    with:
      upstream_ref: main
    secrets: inherit

  v8-canary:
    name: v8-canary
    uses: ./.github/workflows/v8-canary.yml
    with:
      upstream_ref: main
    secrets: inherit

  results:
    name: Postmerge CI results
    needs:
      - cargo-deny
      - codespell
      - repo-checks
      - rust-ci
      - sdk
      - bazel
      - v8-canary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Require successful dependencies
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: python3 .github/scripts/check_ci_results.py
