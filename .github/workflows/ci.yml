name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-patches:
    name: Verify patches
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Set up Git
        shell: bash
        run: git config --global core.autocrlf false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532
        with:
          tool: just@1.51.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.3"

      - name: Install DotSlash
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Clone upstream Codex
        shell: bash
        env:
          UPSTREAM_REF: ${{ inputs.upstream_ref || '' }}
        run: |
          set -euo pipefail
          ref="${UPSTREAM_REF:-main}"
          git clone --depth 1 --branch "${ref}" https://github.com/openai/codex.git upstream || {
            echo "Falling back to latest default branch checkout."
            git clone --depth 1 https://github.com/openai/codex.git upstream
          }

      - name: Install upstream dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          pnpm install --frozen-lockfile

      - name: Run upstream checks
        shell: bash
        env:
          UPSTREAM_TEST_COMMAND: ${{ vars.UPSTREAM_TEST_COMMAND }}
          UPSTREAM_BUILD_COMMAND: ${{ vars.UPSTREAM_BUILD_COMMAND }}
          UPSTREAM_ARTIFACT_GLOB: ${{ vars.UPSTREAM_ARTIFACT_GLOB }}
          SKIP_ARTIFACT_COLLECTION: "1"
        run: |
          set -euo pipefail
          export UPSTREAM_TEST_COMMAND="${UPSTREAM_TEST_COMMAND:-python3 .github/scripts/verify_cargo_workspace_manifests.py && python3 .github/scripts/verify_tui_core_boundary.py && python3 .github/scripts/verify_bazel_clippy_lints.py && python3 -m unittest discover -s scripts/codex_package -p 'test_*.py' && just fmt-check && pnpm run format}"
          ./scripts/build-release.sh upstream dist

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-ubuntu-latest
          path: dist/
          if-no-files-found: ignore
