name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream ref to test. Defaults to main."
        required: false
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    name: Upstream repo checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Set up Git
        shell: bash
        run: git config --global core.autocrlf false

      - uses: ./.github/actions/setup-ci
        with:
          workspace-root: upstream

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.3"

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - uses: ./.github/actions/prepare-patched-upstream
        with:
          upstream-ref: ${{ inputs.upstream_ref || 'main' }}
          fallback-to-default-branch: "true"

      - name: Verify codex-rs Cargo manifests inherit workspace settings
        run: ./scripts/run-upstream-repo-checks.sh upstream

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-ubuntu-latest
          path: upstream/codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: ignore
