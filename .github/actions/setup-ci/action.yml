name: setup-ci
description: Prepare the shared upstream Codex CI toolchain.

inputs:
  workspace-root:
    description: Upstream checkout root relative to the repository workspace.
    required: false
    default: upstream

runs:
  using: composite
  steps:
    - name: Configure Cargo target directory
      shell: bash
      run: |
        set -euo pipefail
        echo "CARGO_TARGET_DIR=${CARGO_TARGET_DIR:-${GITHUB_WORKSPACE}/${{ inputs.workspace-root }}/codex-rs/target}" >> "$GITHUB_ENV"

    - name: Prefer the Git CLI for Cargo git dependencies
      shell: bash
      run: echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

    - name: Install DotSlash
      uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a

    - name: Install just
      uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532
      with:
        tool: just@1.51.0

    - name: Make DotSlash available in PATH (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -w /usr/local/bin ]]; then
          cp "$(command -v dotslash)" /usr/local/bin
        else
          sudo cp "$(command -v dotslash)" /usr/local/bin
        fi

    - name: Make DotSlash available in PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Copy-Item (Get-Command dotslash).Source -Destination "$env:LOCALAPPDATA\\Microsoft\\WindowsApps\\dotslash.exe"

    - name: Enable Git long paths (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: git config --global core.longpaths true
